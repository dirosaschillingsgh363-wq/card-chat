<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>字卡对话</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- ========== 字卡对话 - 列表页 ========== -->
    <div id="card-chat-screen" class="screen">
        <header class="app-header">
            <div class="title-container">
                <h1 class="title">字卡对话</h1>
            </div>
            <div class="action-btn-group">
                <button type="button" class="action-btn" id="cc-more-btn" title="更多"
                    onclick="event.stopPropagation();if(typeof showCardChatMenu==='function')showCardChatMenu()">⋯</button>
            </div>
        </header>
        <div id="cc-search-bar" class="cc-search-bar">
            <div class="cc-search-pill">
                <input type="text" id="cc-search-input" placeholder="搜索对话内容…" class="cc-search-input">
                <button type="button" id="cc-search-mode" class="cc-search-mode-btn">消息</button>
            </div>
        </div>
        <div id="cc-more-menu" class="checkin-more-menu" style="display:none;">
            <div id="cc-more-backdrop" class="checkin-more-backdrop"></div>
            <div class="checkin-more-list">
                <button type="button" id="cc-menu-new">+&nbsp; 新建对话</button>
                <button type="button" id="cc-menu-import">↓&nbsp; 导入字卡包</button>
                <button type="button" id="cc-menu-export">↑&nbsp; 导出字卡</button>
                <button type="button" id="cc-menu-tags">⊟&nbsp; 管理标签</button>
                <button type="button" id="cc-menu-tagbar">◫&nbsp; 标签筛选  关</button>
                <button type="button" id="cc-menu-decor">◈&nbsp; 壁纸装扮</button>
                <button type="button" id="cc-menu-cards">□&nbsp; 全局字卡管理</button>
                <button type="button" id="cc-menu-userroles">&#9786;&nbsp; 管理身份</button>
                <button type="button" id="cc-menu-characters">&#9734;&nbsp; 管理群聊角色</button>
                <button type="button" id="cc-menu-title-align">≡&nbsp; 标题居中  关</button>
                <button type="button" id="cc-menu-night">&#9790;&nbsp; 夜间模式  关</button>
            </div>
        </div>
        <main class="content" id="cc-list-content">
            <div id="cc-conv-list"></div>
        </main>
    </div>

    <!-- ========== 字卡对话 - 聊天页 ========== -->
    <div id="card-chat-room-screen" class="screen">
        <header class="app-header">
            <button class="back-btn" data-target="card-chat-screen">‹</button>
            <div class="title-container">
                <h1 class="title" id="cc-room-title">对话</h1>
                <div class="subtitle" id="cc-room-mode-label"></div>
            </div>
            <div class="action-btn-group">
                <button type="button" class="action-btn" id="cc-room-more-btn" title="更多"
                    onclick="event.stopPropagation();if(typeof showCardChatRoomMenu==='function')showCardChatRoomMenu()">⋯</button>
            </div>
        </header>
        <div id="cc-room-more-menu" class="checkin-more-menu" style="display:none;">
            <div id="cc-room-more-backdrop" class="checkin-more-backdrop"></div>
            <div class="checkin-more-list">
                <button type="button" id="cc-room-menu-mode">◇&nbsp; 切换字卡模式</button>
                <button type="button" id="cc-room-menu-reply">◈&nbsp; 回复方式</button>
                <button type="button" id="cc-room-menu-cross">⇄ 跨风格回复  关</button>
                <button type="button" id="cc-room-menu-echo">◎ 回声模式  开</button>
                <button type="button" id="cc-room-menu-cards">□&nbsp; 字卡管理</button>
                <button type="button" id="cc-room-menu-edit">✎&nbsp; 编辑角色</button>
                <button type="button" id="cc-room-menu-decor">◈&nbsp; 壁纸装扮</button>
                <button type="button" id="cc-room-menu-minimal">▫ 极简模式  关</button>
                <button type="button" id="cc-room-menu-capture">▣&nbsp; 消息截图</button>
                <button type="button" id="cc-room-menu-night">☾&nbsp; 夜间模式  关</button>
                <button type="button" id="cc-room-menu-clear">✕&nbsp; 清空记录</button>
            </div>
        </div>
        <main class="content" id="cc-room-content" style="padding:0;display:flex;flex-direction:column;">
            <div id="cc-messages" class="cc-messages"></div>
            <div id="cc-capture-bar" class="cc-capture-bar" style="display:none;">
                <span id="cc-capture-count">已选择 0 条</span>
                <div style="display:flex;gap:8px;">
                    <button type="button" id="cc-capture-gen" disabled>生成截图</button>
                    <button type="button" id="cc-capture-cancel">取消</button>
                </div>
            </div>
            <div class="cc-input-area">
                <div class="cc-mode-indicator" id="cc-mode-indicator"></div>
                <div class="cc-input-row">
                    <button type="button" id="cc-user-role-btn" class="cc-user-role-btn" title="切换身份"><span style="font-size:14px;color:#bbb;">&#9786;</span></button>
                    <textarea id="cc-msg-input" rows="1" placeholder="说点什么..."></textarea>
                    <button id="cc-send-btn" class="cc-send-btn" title="触发回复">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                    <button id="cc-user-send-btn" class="cc-user-send-btn">发送</button>
                </div>
            </div>
        </main>
    </div>

    <!-- ========== 字卡对话 - 字卡管理页 ========== -->
    <div id="card-chat-settings-screen" class="screen">
        <header class="app-header">
            <button class="back-btn" data-target="card-chat-room-screen">‹</button>
            <div class="title-container">
                <h1 class="title">字卡管理</h1>
            </div>
        </header>
        <main class="content" id="cc-settings-content"></main>
    </div>

    <!-- ========== 字卡对话 - 全局字卡管理页 ========== -->
    <div id="card-chat-global-screen" class="screen">
        <header class="app-header">
            <button class="back-btn" data-target="card-chat-screen">‹</button>
            <div class="title-container">
                <h1 class="title">全局字卡管理</h1>
            </div>
            <div class="action-btn-group">
                <button type="button" class="action-btn" id="cc-global-select-btn" title="多选">☐</button>
            </div>
        </header>
        <div class="cc-global-search-bar">
            <input type="text" id="cc-global-search" class="cc-global-search-input" placeholder="搜索字卡文本 / 关键词…">
        </div>
        <div class="cc-global-filter-bar" id="cc-global-filter-bar"></div>
        <main class="content" id="cc-global-content"></main>
        <div class="cc-global-batch-bar" id="cc-global-batch-bar" style="display:none;">
            <button type="button" id="cc-global-batch-range" class="cc-batch-range">范围</button>
            <button type="button" id="cc-global-batch-copy">复制到…</button>
            <button type="button" id="cc-global-batch-move">移动到…</button>
            <button type="button" id="cc-global-batch-del" class="cc-batch-del">删除</button>
            <button type="button" id="cc-global-batch-cancel" class="cc-batch-cancel">取消</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/card_chat.js"></script>
</body>
</html>
